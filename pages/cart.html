<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/public/css/style.css" rel="stylesheet">
    <link rel="icon" href="/public/images/logo.jpg" type="image/jpeg">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="restaurant-brand">
                <div class="logo-container">
                    <img src="/public/images/logo.jpg" alt="Schezwan Dragon Logo" class="logo-img">
                    <div class="logo-text">
                        <h1 class="restaurant-name">Szechuan Dragon</h1>
                        <p class="restaurant-tagline">Fiery Flavors, Exotic Tastes</p>
                    </div>
                </div>
            </div>
            <nav class="header-nav">
                <a href="/">Home</a>
                <a href="/menu">Menu</a>
                <a href="/help">Help</a>
                <a href="/cart" class="cart-icon active">Your Cart <span id="headerCartCount" class="cart-count">0</span></a>
            </nav>
        </div>
    </header>

    <main class="container mt-4">
        <div class="progress-steps mb-4">
            <div class="d-flex justify-content-center">
                <div class="step active">1. Cart</div>
                <div class="step-line"></div>
                <div class="step">2. User Details</div>
            </div>
        </div>

        <h2>Your Cart</h2>
        
        <div id="cartItems" class="mt-4"></div>

        <div class="cart-summary mt-4">
            <h3>Summary</h3>
            <div class="summary-row">
                <span>Item Price</span>
                <span id="summaryItemPrice">₹0.00</span>
            </div>
            <div class="summary-row">
                <span>Discount</span>
                <span>FREE</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span>₹13.00</span>
            </div>
            <div class="summary-row">
                <span>Taxes (5%)</span>
                <span id="summaryTax">₹0.00</span>
            </div>
            <div class="summary-row summary-total">
                <span>TOTAL</span>
                <span id="summaryTotal">₹0.00</span>
            </div>
            
            <div class="d-flex gap-3 mt-4">
                <a href="/user-details" class="btn btn-primary flex-grow-1">Next</a>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="/login">Admin Login</a>
                <a href="/help">Contact Us</a>
            </div>
        </div>
        <div class="copyright">
            © 2026 Szechuan Dragon Restaurant. All rights reserved.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            updateCartCount();
        });
        
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItems = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center">Your cart is empty</p>';
                updateSummary(0);
                return;
            }
            
            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                return `
                    <div class="cart-item mb-3 p-3 border rounded">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h4>${item.name}</h4>
                                <p class="text-muted mb-1">₹${item.price.toFixed(2)} per item</p>
                                <p class="text-muted">Delicious ${item.name.toLowerCase()} prepared fresh daily</p>
                            </div>
                            <div class="text-end">
                                <div class="d-flex align-items-center gap-2 mb-2 justify-content-end">
                                    <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${item.id}, -1)" ${item.quantity <= 1 ? 'disabled' : ''}>
                                        -
                                    </button>
                                    <span class="px-3">${item.quantity}</span>
                                    <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${item.id}, 1)" ${item.quantity >= 10 ? 'disabled' : ''}>
                                        +
                                    </button>
                                </div>
                                <h5 class="text-dark">₹${itemTotal.toFixed(2)}</h5>
                                <button class="btn btn-sm btn-link text-danger p-0" onclick="removeItem(${item.id})">Remove</button>
                                ${item.quantity >= 10 ? '<small class="text-danger d-block">Max limit reached</small>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateSummary(total);
        }
        
        function updateSummary(subtotal) {
            const deliveryFee = 13.00;
            const tax = subtotal * 0.005; 
            const total = subtotal + deliveryFee + tax;
            
            document.getElementById('summaryItemPrice').textContent = `₹${subtotal.toFixed(2)}`;
            document.getElementById('summaryTax').textContent = `₹${tax.toFixed(2)}`;
            document.getElementById('summaryTotal').textContent = `₹${total.toFixed(2)}`;
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('headerCartCount').textContent = totalItems;
        }
        
        function updateQuantity(id, change) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(item => item.id === id);
            
            if (item) {
                if (change > 0 && item.quantity >= 10) {
                    alert('Maximum 10 items per dish allowed');
                    return;
                }
                
                if (change < 0 && item.quantity <= 1) {
                    return;
                }
                
                item.quantity += change;
                localStorage.setItem('cart', JSON.stringify(cart));
                loadCart();
                updateCartCount();
            }
        }
        
        function removeItem(id) {
            if (!confirm('Are you sure you want to remove this item from your cart?')) {
                return;
            }
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
            updateCartCount();
        }
    </script>
    
    <style>
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FF6B00;
            box-shadow: 0 4px 8px rgba(255, 107, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .logo-img:hover {
            transform: rotate(5deg) scale(1.05);
            box-shadow: 0 6px 12px rgba(255, 107, 0, 0.4);
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        
        .restaurant-name {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2.2rem;
            font-weight: bold;
            margin: 0;
            background: linear-gradient(45deg, #FF6B00, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .restaurant-tagline {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.9rem;
            color: #666;
            margin: 0;
            font-style: italic;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom: 3px solid #FF6B00;
        }
        
        .header-nav {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        
        .header-nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .header-nav a:hover {
            background-color: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
        }
        
        .header-nav a.active {
            background-color: #FF6B00;
            color: white;
        }
        
        .cart-icon {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: rgba(255, 107, 0, 0.1);
            border: 1px solid #FF6B00;
        }
        
        .cart-count {
            background-color: #FF6B00;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .cart-item {
            transition: all 0.2s ease;
        }
        
        .cart-item:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row.summary-total {
            font-weight: bold;
            font-size: 1.2rem;
            border-top: 2px solid #FF6B00;
            margin-top: 8px;
            padding-top: 12px;
            border-bottom: none;
        }
        
        .btn:focus,
        .btn:active {
            outline: none !important;
            box-shadow: none !important;
        }
        
        .progress-steps {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .step {
            background-color: #f0f0f0;
            padding: 10px 20px;
            border-radius: 20px;
            color: #666;
            font-weight: 500;
        }
        
        .step.active {
            background-color: #FF6B00;
            color: white;
        }
        
        .step-line {
            width: 60px;
            height: 3px;
            background-color: #f0f0f0;
            margin: 0 10px;
            align-self: center;
        }
        
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            
            .logo-container {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .restaurant-name {
                font-size: 1.8rem;
            }
            
            .header-nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            
            .header-nav a {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            
            .cart-item {
                flex-direction: column;
                gap: 15px;
            }
            
            .cart-item > div {
                width: 100% !important;
            }
        }
    </style>
</body>
</html>
