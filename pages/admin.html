<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Order Management</title>
    <link rel="icon" href="/public/images/logo.jpg" type="image/jpeg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        .btn-reject {
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-reject:hover {
            background-color: #c82333;
        }

        :root {
            --orange: #FF6B00;
            --orange-light: #FF8C42;
            --white: #FFFFFF;
            --light-gray: #F8F9FA;
            --dark-gray: #333333;
        }
        
        body {
            background-color: var(--white);
            color: var(--dark-gray);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--dark-gray) !important;
            color: var(--white) !important;
            padding: 15px 0;
            border-bottom: 3px solid var(--orange);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .header-nav a {
            color: var(--white) !important;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .header-nav a:hover {
            color: var(--orange) !important;
        }
        
        .orange-text {
            color: var(--orange) !important;
            font-weight: bold;
        }
        
        .admin-table {
            width: 100%;
            background-color: var(--white);
            border-collapse: collapse;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        
        .admin-table thead {
            background-color: var(--orange);
            color: var(--white);
        }
        
        .admin-table th {
            padding: 12px 8px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #ddd;
        }
        
        .admin-table td {
            padding: 12px 8px;
            border: 1px solid #ddd;
            vertical-align: top;
        }
        
        .admin-table tbody tr:nth-child(even) {
            background-color: var(--light-gray);
        }
        
        .admin-table tbody tr:hover {
            background-color: #FFF5E6;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-pending {
            background-color: #ffc107;
            color: #000;
        }
        
        .status-confirmed {
            background-color: #28a745;
            color: #fff;
        }
        
        .btn-orange {
            background-color: var(--orange);
            border-color: var(--orange);
            color: var(--white);
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-orange:hover {
            background-color: var(--orange-light);
            color: var(--white);
        }
        
        .btn-orange:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        main.container {
            padding: 20px;
            max-width: 1400px;
        }
        
        .no-orders {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }

        .item-list {
            font-size: 13px;
            line-height: 1.6;
        }
        
        .item-list div {
            margin-bottom: 4px;
        }
        
        .user-details {
            font-size: 13px;
            line-height: 1.6;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--white);
            border: 2px solid var(--orange);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: var(--orange);
            margin: 0;
            font-size: 32px;
        }
        
        .stat-card p {
            margin: 5px 0 0 0;
            color: var(--dark-gray);
            font-size: 14px;
        }
        
        .table-responsive {
            overflow-x: auto;
        }
        
        .btn-reject {
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn-reject:hover { background-color: #c82333; }
    </style>
</head>

<body>
<header>
    <div class="header-top">
        <h2 style="color:white;margin:0;">ADMIN PANEL</h2>
        <nav class="header-nav">
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </div>
</header>

<main class="container mt-4">
    <h1 class="orange-text mb-4">ORDER MANAGEMENT</h1>

    <div class="stats-cards">
        <div class="stat-card"><h3 id="totalOrders">0</h3><p>Total Orders</p></div>
        <div class="stat-card"><h3 id="pendingOrders">0</h3><p>Pending Orders</p></div>
        <div class="stat-card"><h3 id="confirmedOrders">0</h3><p>Confirmed Orders</p></div>
    </div>

    <div class="table-responsive">
        <div id="ordersContainer"></div>
    </div>

    <div id="noOrdersMessage" class="no-orders" style="display:none;">
        <h4>No orders placed yet</h4>
    </div>
</main>

<script>
if (!localStorage.getItem('adminLoggedIn')) {
    window.location.href = '/login';
}

async function loadOrders() {
    const response = await fetch('/api/orders');
    const orders = await response.json();

    document.getElementById('totalOrders').textContent = orders.length;
    document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
    document.getElementById('confirmedOrders').textContent = orders.filter(o => o.status === 'confirmed').length;

    let html = `
        <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th><th>Items</th><th>Customer</th><th>Total</th><th>Address</th><th>Phone Number</th><th>Status</th><th>Action</th>
            </tr>
        </thead><tbody>
    `;

    orders.forEach(order => {
        let badge = `<span class="status-badge status-pending">PENDING</span>`;
        if (order.status === 'confirmed') badge = `<span class="status-badge status-confirmed">CONFIRMED</span>`;
        if (order.status === 'rejected') badge = `<span class="status-badge" style="background:#dc3545;color:white;">REJECTED</span>`;

        let actions = '';
        if (order.status === 'pending') {
            actions = `
                <button class="btn-orange" onclick="confirmOrder(${order.id})">Accept</button>
                <button class="btn-reject" onclick="rejectOrder(${order.id})">Reject</button>
            `;
        }

        html += `
            <tr>
                <td>#${order.id}</td>
                <td>${order.items.map(i => `${i.product_name} x ${i.quantity}`).join('<br>')}</td>
                <td>${order.first_name} ${order.last_name}</td>
                <td>₹${order.total_amount}</td>
                <td>${order.address}</td>
                <td>
                    ${order.phone}<br>
                    ${order.alternate_phone ? `<span style="color:#666;font-size:12px;">Alt: ${order.alternate_phone}</span>` : ''}
                </td>
                <td>${badge}</td>
                <td>${actions}</td>
            </tr>
        `;
    });

    html += `</tbody></table>`;
    document.getElementById('ordersContainer').innerHTML = html;
}

async function confirmOrder(orderId) {
    if (!confirm('Confirm this order?')) return;

    const res = await fetch(`/api/orders/${orderId}/confirm`, { method: 'POST' });
    if (res.ok) {
        alert('Order confirmed,Thanks for choosing us !!');
        loadOrders();
    }
}

async function rejectOrder(orderId) {
    if (!confirm('Reject this order?')) return;

    const res = await fetch(`/api/orders/${orderId}/reject`, { method: 'POST' });
    if (res.ok) {
        alert('Order rejected');
        loadOrders();
    }
}

function logout() {
    localStorage.removeItem('adminLoggedIn');
    window.location.href = '/login';
}

document.addEventListener('DOMContentLoaded', loadOrders);
setInterval(loadOrders, 30000);
</script>
</body>
</html>
