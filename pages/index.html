<script>

document.addEventListener('DOMContentLoaded', function() {
    class OrderStatusManager {
        constructor() {
            this.STORAGE_KEY = 'szechuan_active_order';
            this.orderStatusLink = document.getElementById('viewOrderStatus');
            this.orderIdSpan = document.getElementById('orderId');
            
            this.checkAndDisplayOrderStatus();
        }
        
        checkAndDisplayOrderStatus() {
            const activeOrder = this.getActiveOrder();
            
            if (activeOrder && activeOrder.status === 'PENDING') {
                this.showOrderStatus(activeOrder.id);
            } else {
                this.hideOrderStatus();
            }
        }
        
        setActiveOrder(orderId) {
            const orderData = {
                id: orderId,
                status: 'PENDING',
                timestamp: new Date().getTime()
            };
            
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(orderData));
            this.showOrderStatus(orderId);
        }
        
        updateOrderStatus(newStatus) {
            const activeOrder = this.getActiveOrder();
            if (activeOrder) {
                activeOrder.status = newStatus;
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(activeOrder));
                
                if (newStatus !== 'PENDING') {
                    setTimeout(() => this.hideOrderStatus(), 5000);
                }
            }
        }
        
        clearActiveOrder() {
            localStorage.removeItem(this.STORAGE_KEY);
            this.hideOrderStatus();
        }
        
        getActiveOrder() {
            const orderData = localStorage.getItem(this.STORAGE_KEY);
            return orderData ? JSON.parse(orderData) : null;
        }
        
        showOrderStatus(orderId) {
            if (this.orderStatusLink) {
                this.orderIdSpan.textContent = orderId;
                this.orderStatusLink.style.display = 'inline-flex';
            }
        }
        
        hideOrderStatus() {
            if (this.orderStatusLink) {
                this.orderStatusLink.style.display = 'none';
            }
        }
        
        checkOrderStatus() {
            const activeOrder = this.getActiveOrder();
            if (activeOrder && activeOrder.status === 'PENDING') {
                const orderAge = new Date().getTime() - activeOrder.timestamp;
                if (orderAge > 120000) { 
                    const randomStatus = Math.random() > 0.5 ? 'CONFIRMED' : 'CANCELLED';
                    this.updateOrderStatus(randomStatus);
                }
            }
        }
    }
    
});

</script>
